<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact - Student</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-image: url('bg img.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
  }

  .sidebar {
    width: 220px;
    background-color: #2c3e50;
    height: 100vh;
    padding-top: 20px;
    position: fixed;
    left: 0;
    top: 0;
  }

  .sidebar a {
    display: block;
    color: white;
    padding: 14px 20px;
    text-decoration: none;
    font-size: 18px;
  }

  .sidebar a:hover {
    background-color: #34495e;
  }

  .sidebar a.active {
    background-color: #1abc9c;
    color: white;
    font-weight: bold;
  }

  .container {
    max-width: 650px;
    margin: 80px auto;
    margin-left: 260px;
    background-color: rgba(255, 255, 255, 0.92);
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
  }

  h1 {
    text-align: center;
    color: #2c3e50;
  }

  label {
    font-weight: bold;
    margin-top: 10px;
    display: block;
  }

  input, textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
  }

  button {
    background-color: #2980b9;
    color: white;
    padding: 10px 25px;
    border: none;
    border-radius: 30px;
    margin-top: 15px;
    cursor: pointer;
  }

  button:hover {
    background-color: #3498db;
  }

  .reply {
    background: #e8f8f5;
    border-left: 5px solid #27ae60;
    padding: 10px;
    border-radius: 6px;
    margin-top: 10px;
  }

  .reply-section {
    margin-top: 25px;
  }

  .admin-link {
    text-align: center;
    margin-top: 20px;
  }

  .admin-link a {
    color: #2980b9;
    text-decoration: none;
    font-weight: bold;
  }

  .admin-link a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="sidebar">
  <a href="sample2.html">Home</a>
  <a href="about1.html">About</a>
  <a href="service1.html">Services</a>
  <a class="active" href="contact1
.html">Contact</a>
</div>

<div class="container">
  <h1>Contact the Department</h1>
  
  <!-- Contact Form -->
  <form id="contactForm">
    <label>Full Name:</label>
    <input type="text" id="name" required placeholder="Enter your name">

    <label>Email:</label>
    <input type="email" id="email" required placeholder="Enter your email (to also check replies)">

    <label>Subject:</label>
    <input type="text" id="subject" required placeholder="Enter subject">

    <label>Message:</label>
    <textarea id="message" required placeholder="Type your message..."></textarea>

    <button type="submit">Send Message</button>
  </form>

  <!-- Reply Section -->
  <div class="reply-section">
    <h3>Your Replies</h3>
    <div id="studentReplies"></div>
  </div>

  <div class="admin-link">
    <p>Admin? <a href="admin_reply.html">Login here</a></p>
  </div>
</div>

<script>
  const contactForm = document.getElementById('contactForm');
  const studentReplies = document.getElementById('studentReplies');
  const emailField = document.getElementById('email');

  // Load replies automatically when student enters their email
  emailField.addEventListener('blur', function() {
    const email = emailField.value.trim();
    if (email) showStudentReplies(email);
  });

  // Submit message
  contactForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const subject = document.getElementById('subject').value.trim();
    const message = document.getElementById('message').value.trim();

    const newMessage = {
      id: Date.now(),
      name,
      email,
      subject,
      message,
      reply: "",
      time: new Date().toLocaleString()
    };

    let messages = JSON.parse(localStorage.getItem('messages')) || [];
    messages.push(newMessage);
    localStorage.setItem('messages', JSON.stringify(messages));

    alert("Your message has been sent!");
    contactForm.reset();
  });

  // Function to show replies
  function showStudentReplies(email) {
    studentReplies.innerHTML = "";
    const messages = JSON.parse(localStorage.getItem('messages')) || [];
    const userMsgs = messages.filter(m => m.email === email && m.reply);

    if (userMsgs.length > 0) {
      userMsgs.forEach(m => {
        const div = document.createElement('div');
        div.classList.add('reply');
        div.innerHTML = `
          <strong>Subject:</strong> ${m.subject}<br>
          <strong>Admin Reply:</strong> ${m.reply}<br>
          <small><em>${m.time}</em></small>
        `;
        studentReplies.appendChild(div);
      });
    } else {
      studentReplies.innerHTML = "<p>No replies yet.</p>";
    }
  }
</script>

</body>
</html>
