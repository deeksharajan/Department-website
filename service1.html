<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Department Services</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-image: url('bg img.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
  }

  .container {
    max-width: 800px;
    margin: 80px auto;
    background-color: rgba(255, 255, 255, 0.92);
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
  }

  h1 {
    text-align: center;
    color: #2c3e50;
    margin-bottom: 20px;
  }

  .service {
    background-color: #ecf0f1;
    border-left: 6px solid #2980b9;
    margin-bottom: 20px;
    padding: 15px 20px;
    border-radius: 8px;
  }

  .sidebar {
    width: 220px;
    background-color: #2c3e50;
    height: 100vh;
    padding-top: 20px;
    position: fixed;
    left: 0;
    top: 0;
  }

  .sidebar a {
    display: block;
    color: white;
    padding: 14px 20px;
    text-decoration: none;
    font-size: 18px;
  }

  .sidebar a.active {
    background-color: #1abc9c;
  }
</style>
</head>
<body>

<div class="sidebar">
  <a href="sample2.html">Home</a>
  <a href="about1.html">About</a>
  <a class="active" href="service1.html">Services</a>
  <a href="contact1.html">Contact</a>
</div>

<div class="container">
  <h1>Our Department Services</h1>

  <div class="service" id="service1"></div>
  <div class="service" id="service2"></div>
  <div class="service" id="service3"></div>
  <div class="service" id="service4"></div>
  <div class="service" id="service5"></div>
</div>

<script>
for (let i = 1; i <= 5; i++) {
  const content = localStorage.getItem('service' + i);
  document.getElementById('service' + i).innerHTML = content || '<p>Service details not available yet.</p>';
}
</script>

</body>
</html>
