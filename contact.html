<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin - Reply Panel</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-image: url('bg img.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
  }

  .sidebar {
    width: 220px;
    background-color: #2c3e50;
    height: 100vh;
    padding-top: 20px;
    position: fixed;
    left: 0;
    top: 0;
  }

  .sidebar a {
    display: block;
    color: white;
    padding: 14px 20px;
    text-decoration: none;
    font-size: 18px;
  }

  .sidebar a:hover {
    background-color: #34495e;
  }

  .sidebar a.active {
    background-color: #1abc9c;
    color: white;
    font-weight: bold;
  }

  .container {
    max-width: 800px;
    margin: 80px auto;
    margin-left: 260px;
    background-color: rgba(255, 255, 255, 0.92);
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
  }

  h1 {
    text-align: center;
    color: #2c3e50;
  }

  .message {
    background: #f8f9f9;
    padding: 12px;
    border-left: 6px solid #2980b9;
    border-radius: 8px;
    margin-bottom: 15px;
  }

  .reply-box {
    margin-top: 10px;
  }

  textarea {
    width: 100%;
    height: 60px;
    border-radius: 6px;
    padding: 8px;
    border: 1px solid #ccc;
  }

  button {
    background-color: #27ae60;
    color: white;
    border: none;
    border-radius: 20px;
    padding: 8px 20px;
    margin-top: 8px;
    cursor: pointer;
  }

  button:hover {
    background-color: #2ecc71;
  }

  .reply {
    background: #e8f8f5;
    border-left: 5px solid #27ae60;
    padding: 8px;
    border-radius: 6px;
    margin-top: 8px;
  }

  #loginBox {
    text-align: center;
    margin-bottom: 20px;
  }

  #loginBox input {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }
</style>
</head>
<body>

<div class="sidebar">
  <a href="sample.html">Home</a>
  <a href="about.html">About</a>
  <a href="service.html">Services</a>
  <a class="active" href="sample.html">Admin</a>
</div>

<div class="container">
  <h1>Admin Panel</h1>
  
  <div id="loginBox">
    <input type="password" id="adminPass" placeholder="Enter admin password">
    <button onclick="checkLogin()">Login</button>
  </div>

  <div id="messageList" style="display:none;"></div>
</div>

<script>
  function checkLogin() {
    const pass = document.getElementById('adminPass').value;
    if (pass === "admin123") {
      document.getElementById('loginBox').style.display = "none";
      document.getElementById('messageList').style.display = "block";
      loadMessages();
    } else {
      alert("Incorrect password!");
    }
  }

  function loadMessages() {
    const messages = JSON.parse(localStorage.getItem('messages')) || [];
    const list = document.getElementById('messageList');
    list.innerHTML = "";

    if (messages.length === 0) {
      list.innerHTML = "<p>No messages received.</p>";
      return;
    }

    messages.forEach(msg => {
      const div = document.createElement('div');
      div.classList.add('message');
      div.innerHTML = `
        <strong>Name:</strong> ${msg.name}<br>
        <strong>Email:</strong> ${msg.email}<br>
        <strong>Subject:</strong> ${msg.subject}<br>
        <strong>Message:</strong> ${msg.message}<br>
        <small><em>${msg.time}</em></small>
        ${msg.reply ? `<div class='reply'><strong>Reply:</strong> ${msg.reply}</div>` : ""}
        <div class="reply-box">
          <textarea id="reply-${msg.id}" placeholder="Type reply..."></textarea>
          <button onclick="sendReply(${msg.id})">Send Reply</button>
        </div>
      `;
      list.appendChild(div);
    });
  }

  function sendReply(id) {
    let messages = JSON.parse(localStorage.getItem('messages')) || [];
    const replyText = document.getElementById(`reply-${id}`).value.trim();

    if (!replyText) {
      alert("Please type a reply.");
      return;
    }

    messages = messages.map(m => m.id === id ? {...m, reply: replyText} : m);
    localStorage.setItem('messages', JSON.stringify(messages));

    alert("Reply sent successfully!");
    loadMessages();
  }
</script>

</body>
</html>
